      - "Hobbits"
      - "Wizards"
      - "Rings of Power"
      - "Valar"
      - "Maiar"
      - "Melkor"
      - "Fëanor"
      - "The Silmarils"
      - "Aulë"
      - "Yavanna"
      - "Morgoth"
