<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Chatbot</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🐉 Fantasy Chatbot</h1>
            <p class="subtitle">Chat about fantasy literature and role-playing games</p>
            <button id="new-chat-button" class="new-chat-btn" style="display: none;">New Chat</button>
        </header>

        <div class="chat-container">
            <div id="book-wrapper" class="book-wrapper">
                <div id="chat-messages" class="chat-messages book-spread">
                    <!-- Messages will be injected here as columns -->
                </div>
            </div>

            <div id="pagination-controls" class="pagination-controls" style="display: none;">
                <button id="prev-page" class="page-btn" disabled>&lt; Prev</button>
                <span id="page-indicator">Page 1</span>
                <button id="next-page" class="page-btn" disabled>Next &gt;</button>
            </div>

            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <div id="universe-selection-screen" class="universe-selection-screen">
                <h2>Choose Your Universe</h2>
                <div class="universe-selector">
                    <select id="universe-select">
                        <option value="">Select a universe to begin...</option>
                    </select>
                    <button id="start-chat-button" disabled>Start</button>
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="message-input" placeholder="Ask about your selected universe..."
                        autocomplete="off">
                    <button type="submit" id="send-button" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>

</html>
