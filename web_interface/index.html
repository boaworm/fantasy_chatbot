<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Chatbot</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐉 Fantasy Chatbot</h1>
            <p class="subtitle">Chat about fantasy literature and role-playing games</p>
            <div class="api-config">
                <label for="api-url-input">API URL:</label>
                <input type="text" id="api-url-input" placeholder="http://localhost:8000/api">
                <button id="save-api-url">Save</button>
            </div>
        </header>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message bot-message">
                    <div class="message-content">
                        Welcome! I'm your fantasy chatbot. Please select a universe from the dropdown to get started. What would you like to know?
                    </div>
                </div>
            </div>

            <div id="typing-indicator" class="typing-indicator" style="display: none;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>

            <div class="universe-selector">
                <select id="universe-select">
                    <option value="">Select a universe...</option>
                </select>
            </div>

            <div class="input-area">
                <form id="chat-form">
                    <input
                        type="text"
                        id="message-input"
                        placeholder="Ask about your selected universe..."
                        autocomplete="off"
                    >
                    <button type="submit" id="send-button" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <div class="input-hint">Press Enter to send</div>
            </div>
        </div>

        <footer>
            <p id="footer-universes">Loading universes...</p>
        </footer>
    </div>

<script src="/static/script.js"></script>
</body>
</html>
